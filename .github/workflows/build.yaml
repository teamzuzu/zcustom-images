name: build
on:
  workflow_dispatch:
    inputs:
      runner:
        description: 'runner'
        required: true
        default: 'self-hosted'
        type: choice
        options:
          - ubuntu-latest
          - self-hosted
      image:
        description: 'image (directory name containing a Dockerfile)'
        required: true
        default: 'zuzu-devops'
        type: string
      platform:
        description: 'platform'
        required: true
        default: 'linux/amd64'
        type: choice
        options:
          - 'linux/arm64,linux/amd64'
          - 'linux/amd64'
          - 'linux/arm64'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: teamzuzu/${{ github.event.inputs.image }}
  PLATFORMS: ${{ github.event.inputs.platform }}

jobs:
  build:
    runs-on: ${{ github.event.inputs.runner }}

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: checkout code
        uses: actions/checkout@v6

      - name: validate image
        run: |
          available=$(find . -maxdepth 2 -name Dockerfile | sed 's|/Dockerfile$||; s|^\./||' | sort | tr '\n' ' ')
          echo "Available images: $available"
          image="${{ github.event.inputs.image }}"
          if [ ! -f "${image}/Dockerfile" ]; then
            echo "::error::Unknown image '${image}'. Available: $available"
            exit 1
          fi

      - name: setup buildx
        uses: docker/setup-buildx-action@v4

      - name: login to gh registry ${{ env.REGISTRY }}
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: get metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: docker build and push
        id: build-and-push
        uses: docker/build-push-action@v7
        with:
          context: ${{ github.event.inputs.image }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: ${{ env.PLATFORMS }}
